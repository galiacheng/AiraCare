# Foundry Care Orchestrator — container / hosted-agent profile.
# Differences from the local demo config.yaml:
#   - host 0.0.0.0 so the endpoint is reachable from outside the container
#   - deliberate tier ENABLED and run on the background 'thread' executor so report()
#     returns immediately (T2 runs off the safety path) — see FH1.
# Store stays 'local' so the image runs anywhere out of the box. To use Cosmos, either
# mount your own config or set the store.* fields below and inject AIRACARE_COSMOS_KEY.
server:
  host: "0.0.0.0"
  port: 8971

store:
  backend: local
  sqlite_path: ":memory:"
  # backend: cosmos
  # cosmos_endpoint: "https://<account>.documents.azure.com:443/"
  # cosmos_credential: "${AIRACARE_COSMOS_KEY}"   # injected from env; never inlined
  # cosmos_database: airacare
  # cosmos_auth: aad                              # Managed Identity in the hosted runtime

patient:
  id: p-001
  name: Grandpa Zhang
  disease_stage: moderate

deliberate:
  enabled: true
  executor: thread     # inline | thread | agents (agents = Microsoft Agent Framework, FH3)

knowledge:
  backend: local

contacts: {}
