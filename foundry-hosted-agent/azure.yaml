# yaml-language-server: $schema=https://raw.githubusercontent.com/Azure/azure-dev/main/schemas/v1.0/azure.yaml.json

requiredVersions:
    extensions:
        azure.ai.agents: '>=1.0.0-beta.4'
name: airacare-care-orchestrator
services:
    ai-project:
        host: azure.ai.project
        deployments:
            - model:
                format: OpenAI
                name: gpt-5.4
                version: "2026-03-05"
              name: gpt-5.4
              sku:
                capacity: 10
                name: GlobalStandard
    airacare-care-orchestrator:
        project: src/airacare-care-orchestrator
        host: azure.ai.agent
        language: python
        uses:
            - ai-project
        codeConfiguration:
            entryPoint: main.py
            runtime: python_3_13
        container:
            resources:
                cpu: "0.5"
                memory: 1Gi
        description: 'AiraCare''s advisory cloud care-orchestrator: composes warm, plain-language caregiver briefings for in-home Alzheimer''s care by consulting five connected specialists (risk-reasoning, knowledge, escalation, cognitive-trend, briefing). Advisory only — it never sets the risk level or drives escalation, and it deterministically files each forwarded daily event to the care record.'
        environmentVariables:
            - name: AZURE_AI_MODEL_DEPLOYMENT_NAME
              value: ${AZURE_AI_MODEL_DEPLOYMENT_NAME}
            - name: AIRACARE_COSMOS_ENDPOINT
              value: ${AIRACARE_COSMOS_ENDPOINT}
            - name: AIRACARE_COSMOS_DATABASE
              value: ${AIRACARE_COSMOS_DATABASE}
            - name: AIRACARE_COSMOS_KEY_VAULT_URI
              value: ${AIRACARE_COSMOS_KEY_VAULT_URI}
            - name: AIRACARE_COSMOS_KEY_SECRET
              value: ${AIRACARE_COSMOS_KEY_SECRET}
            - name: AIRACARE_SEARCH_ENDPOINT
              value: ${AIRACARE_SEARCH_ENDPOINT}
            - name: AIRACARE_SEARCH_KB
              value: ${AIRACARE_SEARCH_KB}
            - name: AIRACARE_SEARCH_KS
              value: ${AIRACARE_SEARCH_KS}
        kind: hosted
        metadata:
            tags:
                - Agent Framework
                - AI Agent Hosting
                - Azure AI AgentServer
                - Responses Protocol
                - AiraCare
        name: airacare-care-orchestrator
        protocols:
            - protocol: responses
              version: 2.0.0
infra:
    provider: microsoft.foundry
