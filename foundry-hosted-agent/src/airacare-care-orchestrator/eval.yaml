name: airacare-rag-safety
agent:
    name: airacare-care-orchestrator
    kind: hosted
    version: "5"
    config: .agent_configs\baseline\metadata.yaml
dataset:
    local_uri: eval\care-golden.jsonl
evaluators:
    - builtin.task_adherence
    - builtin.groundedness
    - builtin.relevance
    - name: airacare-rag-safety
      version: "1"
      local_uri: evaluators\airacare-rag-safety\rubric_dimensions.json
options:
    eval_model: gpt-5.4
max_samples: 15
