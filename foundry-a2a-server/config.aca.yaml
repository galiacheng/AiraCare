# Foundry Care Orchestrator - Azure Container Apps (hosted-agent) profile. FH4.
#
# Differences from config.container.yaml:
#   - store.backend: cosmos with cosmos_auth: aad -> the app authenticates to the EXISTING
#     Cosmos account with its user-assigned Managed Identity (no account key anywhere). The
#     ACA runtime sets AZURE_CLIENT_ID to the MI's clientId so DefaultAzureCredential selects it.
#   - endpoint/database are injected from the environment (${...}) so this image stays generic;
#     the ACA app supplies AIRACARE_COSMOS_ENDPOINT / AIRACARE_COSMOS_DATABASE at deploy time.
#
# The bearer token is injected via AIRACARE_A2A_TOKEN (an ACA secret), not written here.
# The deliberate tier runs on the background 'thread' executor so report() returns immediately
# (T2 stays off the edge safety path). To graduate the hosted app to model-backed T2, set
# executor: agents and uncomment the foundry_* binding below — the six Connected Agents then run
# on the Microsoft Agent Framework against gpt-5.4 (AAD via the same MI, no key) and produce an
# advisory caregiver narrative. The model NEVER sets the risk level; it is narrative-only.
server:
  host: "0.0.0.0"
  port: 8971

store:
  backend: cosmos
  cosmos_endpoint: "${AIRACARE_COSMOS_ENDPOINT}"
  cosmos_database: "${AIRACARE_COSMOS_DATABASE}"
  cosmos_auth: aad
  cosmos_tls_verify: true

patient:
  id: p-001
  name: Grandpa Zhang
  disease_stage: moderate

deliberate:
  enabled: true
  executor: thread     # inline | thread | agents (agents = Microsoft Agent Framework)
  # Model binding for executor: agents (advisory narrative only). Injected by infra/foundry.bicep.
  # foundry_endpoint: "${AIRACARE_FOUNDRY_ENDPOINT}"
  # foundry_deployment: "${AIRACARE_FOUNDRY_DEPLOYMENT}"
  # foundry_api_version: preview
  # --- OR delegate the advisory narrative to a separately DEPLOYED Foundry Hosted Agent
  #     (Responses protocol, grounded in Foundry IQ). Takes precedence over foundry_* above and
  #     works with executor: thread or agents. AAD via the same Managed Identity (no key).
  # hosted_agent_endpoint: "${AIRACARE_HOSTED_AGENT_ENDPOINT}"  # AGENT_<AGENT>_RESPONSES_ENDPOINT
  # hosted_agent_name: airacare-care-orchestrator

knowledge:
  backend: local

contacts: {}
