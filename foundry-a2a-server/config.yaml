# Foundry Care Orchestrator — cloud target for the edge agent
server:
  host: "127.0.0.1"
  port: 8971                 # matches edge cloud.a2a_endpoint (http://localhost:8971/a2a)

# Patient-state store (Decision #6 = C: local for this scaffold)
store:
  backend: local             # local (SQLite / in-memory) | cosmos (production; needs [cosmos])
  sqlite_path: ":memory:"    # ":memory:" for ephemeral, or a file path to persist (local)
  # Cosmos backend (production graduation — see foundry-a2a-server/docs/production.md):
  # cosmos_endpoint: "https://<account>.documents.azure.com:443/"
  # cosmos_credential: "<key-or-injected-from-env>"
  # cosmos_database: airacare

# Default patient profile seeded into the local store (drives disease-stage reasoning)
patient:
  id: p-001
  name: Grandpa Zhang
  disease_stage: moderate    # mild | moderate | severe

# Asynchronous DELIBERATE tier (multi-agent fusion) — stubbed for this scaffold
deliberate:
  enabled: false
  # Model-backed advisory narrative (T2, advisory-only — never sets the risk level). Two options:
  #   (a) in-process MAF workflow bound to a shared Foundry model (needs executor: agents):
  #       executor: agents
  #       foundry_endpoint: "https://<account>.openai.azure.com/"
  #       foundry_deployment: gpt-5.4
  #   (b) delegate to a separately DEPLOYED Foundry Hosted Agent over the Responses protocol
  #       (grounded in Foundry IQ). Takes precedence over foundry_* and runs on executor thread/agents:
  #       executor: thread
  #       hosted_agent_endpoint: "https://<account>.services.ai.azure.com/api/projects/<project>/agents/<agent>/endpoint/protocols/openai/responses?api-version=v1"
  #       hosted_agent_name: airacare-care-orchestrator

# Knowledge agent RAG backend (grounds cloud advice in care guidelines)
knowledge:
  backend: local              # local (in-memory guideline index) | azure (Azure AI Search — placeholder)

# Cloud-owned escalation ladder contact directory (channel -> target). Used when the
# deliberate tier runs the ack-tracked family -> community -> emergency ladder for L3.
contacts: {}
  # family: "+1-555-0100"
  # community: "neighborhood-watch"
  # emergency: "112"
